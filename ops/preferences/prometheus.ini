# ===============================================================================
# Prometheus Observability Configuration
# ===============================================================================
#
# Configure Prometheus metrics export for monitoring Pychron application
# and experiment execution.
#

[pychron.observability]
# Enable Prometheus metrics collection and HTTP export
enabled = false

# Host address to bind metrics HTTP server to
# Use 0.0.0.0 to listen on all interfaces (not recommended for security)
# Use 127.0.0.1 for localhost only (default, recommended)
host = 127.0.0.1

# Port to bind metrics HTTP server to
# Default: 9109
# Valid range: 1-65535
port = 9109

# Prometheus metric namespace prefix
# All exported metrics will be prefixed with: <namespace>_<metric_name>
# Default: pychron
namespace = pychron
