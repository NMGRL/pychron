# Prometheus configuration for Pychron metrics export
# 
# Run with: prometheus --config.file=prometheus.yml

global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'pychron-monitor'

scrape_configs:
  - job_name: 'pychron'
    # Pychron embedded metrics HTTP server
    static_configs:
      - targets: ['localhost:9109']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 3s
