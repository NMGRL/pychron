name: Documentation Maintenance

on:
  push:
    branches:
      - main

# Prevent multiple doc-audit runs from stacking up on rapid pushes.
concurrency:
  group: doc-maintenance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  DOC_MAP: "docs/doc-map.json"
  OUTPUT_FILE: "docs/auto-update-summary.md"
  AUDIT_SCRIPT: "scripts/doc_audit.py"

jobs:
  audit-docs:
    name: Audit Documentation Impact
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with full history so we can diff against the previous commit
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Determine changed files and commit SHAs
      #
      #    GITHUB_SHA      = current HEAD (after the push)
      #    before_sha      = SHA of the commit immediately before this push
      #                      (empty on repo creation / force-push with no history)
      #
      #    We write changed files to a temp file rather than using an output
      #    variable to avoid multiline quoting issues in GitHub Actions.
      # -----------------------------------------------------------------------
      - name: Detect changed files
        id: changed
        run: |
          CURRENT_SHA="${{ github.sha }}"
          SHORT_SHA=$(git rev-parse --short "$CURRENT_SHA")
          BEFORE_SHA="${{ github.event.before }}"

          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"     >> "$GITHUB_OUTPUT"

          # github.event.before is all-zeros when a branch is first pushed
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE_SHA" ]; then
            echo "before_sha=" >> "$GITHUB_OUTPUT"
            # First commit: list all tracked files
            git ls-files > /tmp/changed_files.txt
          else
            echo "before_sha=${BEFORE_SHA}" >> "$GITHUB_OUTPUT"
            git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" > /tmp/changed_files.txt
          fi

          echo "Changed files:"
          cat /tmp/changed_files.txt

          # Signal whether any files changed at all (empty file = nothing to do)
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # 3. Skip remaining steps early if nothing changed
      # -----------------------------------------------------------------------
      - name: Exit early when no files changed
        if: steps.changed.outputs.has_changes == 'false'
        run: |
          echo "No files changed in this push. Skipping documentation audit."

      # -----------------------------------------------------------------------
      # 4. Set up Python + install the Anthropic SDK
      # -----------------------------------------------------------------------
      - name: Set up Python
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install audit dependencies
        if: steps.changed.outputs.has_changes == 'true'
        run: pip install --quiet "anthropic>=0.40.0"

      # -----------------------------------------------------------------------
      # 5. Run the documentation audit script
      #
      #    The script:
      #      - reads /tmp/changed_files.txt
      #      - loads docs/doc-map.json
      #      - maps changed files to affected documents
      #      - calls Claude API for each affected document
      #      - writes a markdown report to $OUTPUT_FILE
      #      - exits 0 with no output file if no mapped modules changed
      # -----------------------------------------------------------------------
      - name: Run documentation audit
        if: steps.changed.outputs.has_changes == 'true'
        id: audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python "${{ env.AUDIT_SCRIPT }}" \
            --changed-files-file /tmp/changed_files.txt \
            --sha "${{ steps.changed.outputs.short_sha }}" \
            --before-sha "${{ steps.changed.outputs.before_sha }}" \
            --output "${{ env.OUTPUT_FILE }}" \
            --repo-root "." \
            --doc-map "${{ env.DOC_MAP }}" \
            --model "claude-sonnet-4-20250514" \
            --max-diff-lines 400

      # -----------------------------------------------------------------------
      # 6. Check whether the audit produced an output file (only created when
      #    at least one changed file matches a mapped module)
      # -----------------------------------------------------------------------
      - name: Check for audit output
        if: steps.changed.outputs.has_changes == 'true'
        id: check-output
        run: |
          if [ -f "${{ env.OUTPUT_FILE }}" ]; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "Audit produced no report — no mapped modules were changed."
          fi

      # -----------------------------------------------------------------------
      # 7. Create a branch, commit the report, and open a PR
      #
      #    Branch name: docs/auto-update-<short-sha>
      #
      #    If the branch already exists (e.g. workflow re-triggered on the same
      #    SHA), we force-push to update the existing branch rather than failing.
      # -----------------------------------------------------------------------
      - name: Create docs branch and open PR
        if: >
          steps.changed.outputs.has_changes == 'true' &&
          steps.check-output.outputs.has_report == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ steps.changed.outputs.short_sha }}"
          BRANCH="docs/auto-update-${SHORT_SHA}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the branch from current HEAD
          git checkout -B "$BRANCH"

          git add "${{ env.OUTPUT_FILE }}"
          git commit -m "docs: auto-update review for ${SHORT_SHA}

          Generated by doc-maintenance workflow.
          Triggered by commit ${{ steps.changed.outputs.current_sha }}.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push --force origin "$BRANCH"

          # Build a concise PR title and body from the report header
          AFFECTED_DOCS=$(python - <<'PY'
          import json, pathlib

          report = pathlib.Path("${{ env.OUTPUT_FILE }}").read_text()
          # Extract the "Affected Documents" table rows for the PR title
          doc_names = []
          in_table = False
          for line in report.splitlines():
              if line.startswith("| Affected") or line.startswith("|---|"):
                  in_table = True
                  continue
              if in_table and line.startswith("|"):
                  # Extract doc name from first cell: "| [Name](#id) | ..."
                  cell = line.split("|")[1].strip()
                  # Strip markdown link syntax [text](#anchor)
                  if cell.startswith("["):
                      cell = cell[1:cell.index("]")]
                  doc_names.append(cell)
              elif in_table and not line.startswith("|"):
                  break
          print(", ".join(doc_names) if doc_names else "documentation")
          PY
          )

          # Check for an existing open PR for this branch to avoid duplicates
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --title "docs: review documentation updates for ${SHORT_SHA}" \
              --body-file "${{ env.OUTPUT_FILE }}"
            PR_NUMBER="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --title "docs: review documentation updates for ${SHORT_SHA}" \
              --body-file "${{ env.OUTPUT_FILE }}" \
              --base main \
              --head "$BRANCH" \
              --label documentation \
              --assignee "${{ github.actor }}")
            # Extract PR number from the URL (e.g. https://github.com/org/repo/pull/42)
            PR_NUMBER="${PR_URL##*/}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 8. Enable auto-merge on the PR (squash strategy)
      #
      #    GitHub will merge the PR automatically once all required status
      #    checks pass and any required reviews are approved.
      #
      #    IMPORTANT: If the repository has no branch protection rules or
      #    required status checks on main, GitHub will merge the PR immediately
      #    after auto-merge is enabled — there is no built-in delay. To gate
      #    the merge on the Docusaurus build passing, add a required status
      #    check for the "Build & Deploy Docusaurus" workflow in:
      #      Settings → Branches → main → Require status checks to pass
      #
      #    The `pull-requests: write` permission (set at the top of this file)
      #    is required to enable auto-merge. The GITHUB_TOKEN is sufficient —
      #    no PAT is needed as long as auto-merge is allowed for the repository
      #    (Settings → General → Allow auto-merge must be checked).
      # -----------------------------------------------------------------------
      - name: Enable auto-merge
        if: >
          steps.changed.outputs.has_changes == 'true' &&
          steps.check-output.outputs.has_report == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pr_number }}"

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found — skipping auto-merge."
            exit 0
          fi

          echo "Enabling auto-merge (squash) on PR #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" --auto --squash \
            --subject "docs: auto-merge documentation update for ${{ steps.changed.outputs.short_sha }}"

          echo "Auto-merge enabled. PR will merge once all required checks pass."

      # -----------------------------------------------------------------------
      # 10. Summary step — always runs, prints outcome to the Actions summary page
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        env:
          HAS_CHANGES: ${{ steps.changed.outputs.has_changes }}
          HAS_REPORT:  ${{ steps.check-output.outputs.has_report }}
          SHORT_SHA:   ${{ steps.changed.outputs.short_sha }}
          PR_NUMBER:   ${{ steps.create-pr.outputs.pr_number }}
        run: |
          {
            echo "## Documentation Audit — \`${SHORT_SHA}\`"
            echo ""
            if [ "$HAS_CHANGES" != "true" ]; then
              echo "ℹ️  No files changed. Nothing to audit."
            elif [ "$HAS_REPORT" != "true" ]; then
              echo "ℹ️  Changed files did not match any documented module."
              echo ""
              echo "No PR was opened."
            else
              echo "✅ Audit complete. PR #${PR_NUMBER} opened on branch \`docs/auto-update-${SHORT_SHA}\`."
              echo ""
              echo "Auto-merge (squash) is enabled — the PR will merge automatically once all required checks pass."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
